name: Validar script

on:
  push:
    branches: [ "main" ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Instalar shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Ejecutar shellcheck
      run: shellcheck script.sh
